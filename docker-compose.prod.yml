version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    command: sh -c "cd /app/backend && python manage.py migrate && python manage.py seed_demo_data && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - media_data:/app/backend/media
      - static_data:/app/backend/staticfiles

volumes:
  postgres_data:
  media_data:
  static_data:
